spring:
  application:
    name: spring-security-bouali
  datasource:
    url: jdbc:postgresql://localhost:5432/spring_security
    username: postgres
    password: chris
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
app:
  security:
    jwt:
      access-token-expiration: 86400000
      refresh-token-expiration: 604099898
